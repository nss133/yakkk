# 폐쇄망 반입용 Windows 단일 실행파일 빌드 (수동 트리거)
# 산출물: yakgwan-search.exe (python 런타임 + python-docx 내장, DB는 별도 동봉)
name: build-windows-exe

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build deps
        run: pip install pyinstaller python-docx
      - name: Build onefile exe
        run: >
          pyinstaller --onefile --name yakgwan-search --paths src
          --hidden-import docx
          src/launch_app.py
      - name: Smoke — DB 가드 확인
        shell: cmd
        run: |
          rem DB 없이 실행하면 안내 메시지 출력 후 스스로 종료해야 함(크래시 아님)
          dist\yakgwan-search.exe < NUL > out.txt 2>&1
          type out.txt
          findstr "DB" out.txt
      - uses: actions/upload-artifact@v4
        with:
          name: yakgwan-search-exe
          path: dist/yakgwan-search.exe
          retention-days: 7
